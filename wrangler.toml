name = "qiaomu-blog-opensource"
main = "worker.ts"
compatibility_date = "2026-04-14"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[dev]
port = 8788

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[ai]
binding = "WORKERS_AI"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "qiaomu-blog-opensource"

# Minimal resource bindings for open-source / Deploy to Cloudflare usage.
# These IDs point at the free-tier resources created during this Cloudflare setup.
[[d1_databases]]
binding = "DB"
database_name = "qiaomu-blog-opensource"
database_id = "a11ac4a9-6b66-4655-bf27-a9770b3e98b7"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "qiaomu-blog-opensource"

[vars]
NEXT_PUBLIC_SITE_URL = "https://qiaomu-blog-opensource.mushengziyue.workers.dev"
AI_BASE_URL = "https://api.openai.com/v1"
AI_MODEL = "gpt-4o-mini"
WORKERS_AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"

# Optional Queue binding for background jobs. Uncomment after creating the queue.
# [[queues.producers]]
# binding = "BACKGROUND_QUEUE"
# queue = "qiaomu-blog-background-jobs"
#
# [[queues.consumers]]
# queue = "qiaomu-blog-background-jobs"
